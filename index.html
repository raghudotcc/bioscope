<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bioscope Tamil 🎬</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+Tamil:wght@700&display=swap" rel="stylesheet">
<style>
:root{--gold:#FFD700;--pink:#FF1493;--orange:#FF6B35;--teal:#00CED1;--dark:#0d0520}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:#fff;font-family:'Bebas Neue',Impact,sans-serif;min-height:100vh;overflow:hidden}
.strip{position:fixed;left:0;right:0;height:52px;background:#111;z-index:200;display:flex;align-items:center;border:2px solid #222}
.strip-top{top:0;border-top:none}.strip-bottom{bottom:0;border-bottom:none}
.perfs{display:flex;padding:0 6px}
.perf{width:34px;height:28px;border:3px solid #333;border-radius:5px;background:var(--dark);flex-shrink:0;margin:0 7px}
.strip-title{position:absolute;left:50%;transform:translateX(-50%);color:#3a3a3a;font-size:.85rem;letter-spacing:.25em;white-space:nowrap;pointer-events:none}
.stars{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite;animation-delay:var(--dl,0s)}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.6)}}

/* Arc overlay */
.arc-overlay{display:none;pointer-events:none}
.arc-overlay.show{display:block}
.arc-side{position:fixed;top:52px;bottom:52px;display:flex;align-items:center;z-index:150}
.arc-side.left{left:14px}.arc-side.right{right:14px}

/* Game area */
.game{position:fixed;top:52px;bottom:52px;left:0;right:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 25%,#3a0b5e 0%,var(--dark) 70%);overflow-y:auto;padding:16px 110px}

/* ── Title ── */
.title-screen{text-align:center;animation:fadeUp .8s ease}
.clap{font-size:4rem;display:block;animation:clap 3s infinite}
@keyframes clap{0%,85%,100%{transform:rotate(0)}87%{transform:rotate(-12deg)}90%{transform:rotate(12deg)}93%{transform:rotate(-6deg)}96%{transform:rotate(6deg)}}
.t-en{font-size:clamp(2.8rem,7vw,5.5rem);color:var(--gold);text-shadow:0 0 40px rgba(255,215,0,.5),3px 3px 0 var(--pink);line-height:1}
.t-ta{font-family:'Noto Sans Tamil',sans-serif;font-size:clamp(1.3rem,3.5vw,2.2rem);color:var(--pink);margin:8px 0 4px;text-shadow:0 0 20px rgba(255,20,147,.4)}
.t-party{color:var(--gold);font-size:1.1rem;letter-spacing:.15em;margin:8px 0 20px;opacity:.85}
.t-tag{color:rgba(255,255,255,.45);font-size:.9rem;letter-spacing:.2em;margin:0 0 26px;font-family:sans-serif}

/* ── Setup screen ── */
.setup-screen{text-align:center;animation:fadeUp .6s ease;padding:20px}
.setup-title{font-size:clamp(2rem,5vw,3.5rem);color:var(--gold);text-shadow:2px 2px 0 var(--pink);margin:8px 0 28px}
.teams-row{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:30px}
.team-col{display:flex;flex-direction:column;align-items:center;gap:10px}
.team-dot{width:14px;height:14px;border-radius:50%;margin-bottom:2px}
.team-input{
  background:rgba(255,255,255,.08);border:2px solid rgba(255,215,0,.35);
  border-radius:12px;color:#fff;font-family:'Bebas Neue',Impact,sans-serif;
  font-size:2rem;letter-spacing:.1em;text-align:center;padding:12px 18px;
  width:190px;outline:none;transition:all .2s;
}
.team-input:focus{border-color:var(--gold);background:rgba(255,255,255,.12)}
.setup-vs{font-size:2rem;color:rgba(255,255,255,.25);letter-spacing:.2em;padding-top:20px}

/* ── Scoreboard (in-game) ── */
.scoreboard{
  display:flex;align-items:center;justify-content:center;gap:14px;
  margin-bottom:10px;background:rgba(255,255,255,.06);
  border-radius:14px;padding:8px 22px;border:1px solid rgba(255,215,0,.18)
}
.sc-team{display:flex;align-items:center;gap:10px}
.sc-name{font-size:1.05rem;letter-spacing:.08em;color:rgba(255,255,255,.65)}
.sc-val{font-size:2.8rem;line-height:1;min-width:38px;text-align:center;transition:transform .3s}
.sc-left .sc-val{color:var(--pink)}
.sc-right .sc-val{color:var(--teal)}
.sc-leading .sc-val{filter:drop-shadow(0 0 10px currentColor);transform:scale(1.1)}
.sc-vs{font-size:.85rem;letter-spacing:.2em;color:rgba(255,255,255,.2)}

/* ── Round screen ── */
.round-screen{text-align:center;width:100%;max-width:1100px;animation:fadeUp .45s ease}
.r-badge{display:inline-block;background:var(--pink);padding:5px 22px;border-radius:30px;font-size:1rem;letter-spacing:.15em;margin-bottom:2px}
.r-bignum{font-size:clamp(3rem,9vw,6rem);color:var(--gold);line-height:1;opacity:.1;margin:-4px 0 -12px;pointer-events:none}

/* ── Clue cards ── */
.clues-grid{display:flex;justify-content:center;align-items:stretch;flex-wrap:wrap;gap:14px;margin:14px 0}
.c-card{width:clamp(170px,18vw,220px);min-height:clamp(185px,20vw,240px);border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .4s cubic-bezier(.34,1.56,.64,1);padding:12px}
.c-card.mystery{background:rgba(255,255,255,.04);border:2px dashed rgba(255,215,0,.25)}
.c-card.mystery .q{font-size:clamp(4rem,5.5vw,5.5rem);opacity:.25}
.c-card.revealed{background:linear-gradient(135deg,rgba(255,215,0,.13),rgba(255,20,147,.08));border:2px solid rgba(255,215,0,.7);box-shadow:0 0 24px rgba(255,215,0,.2);animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{0%{transform:scale(.2) rotate(-20deg);opacity:0}65%{transform:scale(1.1) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.c-emoji{font-size:clamp(5rem,7vw,7.5rem);line-height:1.1;display:block}
.c-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;width:100%;height:100%}
.c-inner img{max-width:190px;max-height:190px;object-fit:contain;border-radius:10px;display:block}

/* ── Answer box ── */
.ans-box{background:linear-gradient(135deg,#5a0a9e,var(--pink),var(--orange));border-radius:18px;padding:18px 36px;margin:0 auto;max-width:720px;border:2px solid var(--gold);box-shadow:0 0 40px rgba(255,20,147,.4);display:none;animation:ansIn .6s cubic-bezier(.34,1.56,.64,1)}
.ans-box.show{display:block}
@keyframes ansIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
.ans-label{font-size:.85rem;letter-spacing:.3em;color:rgba(255,255,255,.75);margin-bottom:5px}
.ans-en{font-size:clamp(1.8rem,4vw,3rem);color:var(--gold);text-shadow:2px 2px 0 rgba(0,0,0,.3);line-height:1.1}
.ans-ta{font-family:'Noto Sans Tamil',sans-serif;font-size:clamp(1rem,2.5vw,1.5rem);color:rgba(255,255,255,.85);margin-top:4px}

/* ── Scoring panel ── */
.scoring-panel{animation:fadeUp .4s ease;margin-top:10px;text-align:center}
.scoring-label{font-size:1.6rem;letter-spacing:.2em;color:var(--gold);margin-bottom:10px}
.scoring-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-t0{background:linear-gradient(135deg,var(--pink),#a0003a)!important;color:#fff!important}
.btn-t1{background:linear-gradient(135deg,var(--teal),#006080)!important;color:#fff!important}

/* ── Buttons ── */
.btn{background:linear-gradient(135deg,var(--pink),var(--orange));color:#fff;border:none;padding:12px 32px;font-size:1.5rem;font-family:'Bebas Neue',sans-serif;border-radius:50px;cursor:pointer;letter-spacing:.1em;transition:all .2s;box-shadow:0 4px 20px rgba(255,20,147,.3);margin:5px}
.btn:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 8px 28px rgba(255,20,147,.5)}
.btn:active{transform:scale(.97)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;box-shadow:0 4px 20px rgba(255,215,0,.3)}
.btn-ghost{background:rgba(255,255,255,.08)!important;border:2px solid rgba(255,255,255,.2)!important;color:rgba(255,255,255,.5)!important;box-shadow:none!important}

/* ── Progress pips ── */
.pips{display:flex;justify-content:center;gap:6px;margin-top:10px}
.pip{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18);transition:all .3s}
.pip.cur{background:var(--gold);transform:scale(1.5)}.pip.done{background:var(--pink)}

/* ── Finale / winner ── */
.finale{text-align:center;animation:fadeUp .8s ease;padding:30px}
.winner-line{font-size:clamp(2.5rem,7vw,4.5rem);letter-spacing:.05em;margin-bottom:6px;text-shadow:0 0 30px currentColor}
.final-scores{display:flex;align-items:center;justify-content:center;gap:28px;margin:20px 0}
.final-team{text-align:center}
.final-tname{font-size:1.3rem;letter-spacing:.1em;color:rgba(255,255,255,.6);margin-bottom:4px}
.final-tval{font-size:5rem;line-height:1}
.final-sep{font-size:2rem;color:rgba(255,255,255,.2);align-self:center}

/* ── Confetti ── */
.cf{position:fixed;pointer-events:none;z-index:9999;animation:cfFall linear forwards}
@keyframes cfFall{0%{opacity:1}100%{opacity:0;transform:translateY(110vh) rotate(720deg)}}

@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
</style>
</head>

let S = {screen:'title', song:0, clue:0, answered:false, scored:false,
         teams:['TEAM 1','TEAM 2'], scores:[0,0]};

(function init(){
  buildStars(); buildPerfs(); render();
  document.addEventListener('keydown', e => {
    if(e.code==='Space'||e.code==='ArrowRight'||e.code==='Enter'){
      e.preventDefault(); handleAdvance();
    }
  });
})();

function buildStars(){
  const el=document.getElementById('stars');
  for(let i=0;i<70;i++){
    const d=document.createElement('div'); d.className='star';
    const s=Math.random()*3+1;
    d.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--dl:${Math.random()*5}s`;
    el.appendChild(d);
  }
}
function buildPerfs(){
  const n=Math.ceil(window.innerWidth/52)+2;
  ['tp','bp'].forEach(id=>{const el=document.getElementById(id);for(let i=0;i<n;i++)el.innerHTML+='<div class="perf"></div>';});
}

function render(){
  const arc = document.getElementById('arcOverlay');
  arc.classList.toggle('show', S.screen==='title' || S.screen==='setup');
  const g = document.getElementById('game');
  if(S.screen==='title')  g.innerHTML = renderTitle();
  else if(S.screen==='setup') g.innerHTML = renderSetup();
  else if(S.screen==='play')  g.innerHTML = renderPlay();
  else                         g.innerHTML = renderFinale();
}

/* ── TITLE ── */
function renderTitle(){
  return `<div class="title-screen">
    <span class="clap">🎬</span>
    <div class="t-en">BIOSCOPE<br>TAMIL</div>
    <div class="t-ta">பயோஸ்கோப் தமிழ்</div>
    <div class="t-party">🎊 Megha &amp; Mahesh Game Night 🎊</div>
    <div class="t-tag">✦ GUESS THE SONG FROM THE CLUES ✦</div>
    <button class="btn btn-gold" onclick="goSetup()">▶ &nbsp;START!</button>
    <div style="margin-top:12px;color:rgba(255,255,255,.25);font-size:.85rem;font-family:sans-serif;letter-spacing:.1em">
      ${SONGS.length} songs &nbsp;·&nbsp; Space / → to advance
    </div>
  </div>`;
}

/* ── SETUP ── */
function renderSetup(){
  return `<div class="setup-screen">
    <div style="font-size:2.5rem;margin-bottom:4px">🏆</div>
    <div class="setup-title">NAME YOUR TEAMS</div>
    <div class="teams-row">
      <div class="team-col">
        <div class="team-dot" style="background:var(--pink)"></div>
        <input id="t0inp" class="team-input" value="${S.teams[0]}" maxlength="12"
               placeholder="TEAM 1" oninput="this.value=this.value.toUpperCase()"
               style="border-color:var(--pink);text-shadow:0 0 8px rgba(255,20,147,.4)">
      </div>
      <div class="setup-vs">VS</div>
      <div class="team-col">
        <div class="team-dot" style="background:var(--teal)"></div>
        <input id="t1inp" class="team-input" value="${S.teams[1]}" maxlength="12"
               placeholder="TEAM 2" oninput="this.value=this.value.toUpperCase()"
               style="border-color:var(--teal);text-shadow:0 0 8px rgba(0,206,209,.4)">
      </div>
    </div>
    <button class="btn btn-gold" onclick="beginGame()">🎬 &nbsp;LET'S GO!</button>
    <div style="margin-top:14px">
      <button class="btn btn-ghost" onclick="goHome()" style="font-size:1rem;padding:8px 20px">← BACK</button>
    </div>
  </div>`;
}

/* ── PLAY ── */
function renderPlay(){
  const song=SONGS[S.song], total=song.clues.length, rev=S.clue;
  const [t0,t1]=S.teams, [s0,s1]=S.scores;
  const lead0=s0>s1, lead1=s1>s0;

  const scoreboard = `<div class="scoreboard">
    <div class="sc-team sc-left ${lead0?'sc-leading':''}">
      <div class="sc-name">${t0}</div>
      <div class="sc-val">${s0}</div>
    </div>
    <div class="sc-vs">VS</div>
    <div class="sc-team sc-right ${lead1?'sc-leading':''}">
      <div class="sc-val">${s1}</div>
      <div class="sc-name">${t1}</div>
    </div>
  </div>`;

  const cards=song.clues.map((c,i)=>{
    if(i<rev){
      const inner=c.h?`<div class="c-inner">${c.h}</div>`:`<span class="c-emoji">${c.e}</span>`;
      return `<div class="c-card revealed" id="cc${i}">${inner}</div>`;
    }
    return `<div class="c-card mystery" id="cc${i}"><span class="q">❓</span></div>`;
  }).join('');

  const ans=S.answered ? `<div class="ans-box show">
    <div class="ans-label">🎵 THE SONG IS...</div>
    <div class="ans-en">${song.en}</div>
    <div class="ans-ta">${song.ta}</div>
  </div>` : `<div class="ans-box"></div>`;

  let action='';
  if(rev<total){
    action=`<button class="btn" onclick="handleAdvance()">🎭 &nbsp;REVEAL CLUE ${rev+1}</button>`;
  } else if(!S.answered){
    action=`<button class="btn btn-gold" style="animation:pulse 1s ease infinite" onclick="handleAdvance()">🎵 &nbsp;REVEAL ANSWER!</button>`;
  } else if(!S.scored){
    action=`<div class="scoring-panel">
      <div class="scoring-label">🎯 WHO GOT IT?</div>
      <div class="scoring-btns">
        <button class="btn btn-t0" onclick="awardPoint(0)">🏆 &nbsp;${t0}</button>
        <button class="btn btn-ghost" onclick="awardPoint(-1)">SKIP</button>
        <button class="btn btn-t1" onclick="awardPoint(1)">🏆 &nbsp;${t1}</button>
      </div>
    </div>`;
  } else {
    const isLast=S.song>=SONGS.length-1;
    action=isLast
      ? `<button class="btn btn-gold" onclick="handleAdvance()">🎉 &nbsp;SEE RESULTS!</button>`
      : `<button class="btn" onclick="handleAdvance()">NEXT SONG &nbsp;→</button>`;
  }

  const pips=SONGS.map((_,i)=>`<div class="pip ${i<S.song?'done':i===S.song?'cur':''}"></div>`).join('');

  return `<div class="round-screen">
    ${scoreboard}
    <div class="r-badge">SONG ${S.song+1} OF ${SONGS.length}</div>
    <div class="r-bignum">${S.song+1}</div>
    <div class="clues-grid">${cards}</div>
    ${ans}
    <div style="margin-top:12px">${action}</div>
    <div class="pips">${pips}</div>
  </div>`;
}

/* ── FINALE ── */
function renderFinale(){
  const [t0,t1]=S.teams, [s0,s1]=S.scores;
  let winnerHtml;
  if(s0>s1)      winnerHtml=`<div class="winner-line" style="color:var(--pink)">🏆 ${t0} WINS!</div>`;
  else if(s1>s0) winnerHtml=`<div class="winner-line" style="color:var(--teal)">🏆 ${t1} WINS!</div>`;
  else           winnerHtml=`<div class="winner-line" style="color:var(--gold)">🤝 IT'S A TIE!</div>`;

  return `<div class="finale">
    ${winnerHtml}
    <div class="final-scores">
      <div class="final-team">
        <div class="final-tname">${t0}</div>
        <div class="final-tval" style="color:var(--pink)">${s0}</div>
      </div>
      <div class="final-sep">—</div>
      <div class="final-team">
        <div class="final-tname">${t1}</div>
        <div class="final-tval" style="color:var(--teal)">${s1}</div>
      </div>
    </div>
    <div style="color:rgba(255,255,255,.4);font-family:sans-serif;font-size:.95rem;letter-spacing:.1em;margin-bottom:28px">
      Thanks for playing — Megha &amp; Mahesh! 🎶
    </div>
    <button class="btn btn-gold" onclick="goHome()">▶ PLAY AGAIN</button>
  </div>`;
}

/* ── ACTIONS ── */
function goSetup(){ S.screen='setup'; render(); }
function goHome(){
  S={screen:'title',song:0,clue:0,answered:false,scored:false,teams:['TEAM 1','TEAM 2'],scores:[0,0]};
  render();
}
function beginGame(){
  const t0=(document.getElementById('t0inp').value.trim()||'TEAM 1').toUpperCase().slice(0,12);
  const t1=(document.getElementById('t1inp').value.trim()||'TEAM 2').toUpperCase().slice(0,12);
  S={screen:'play',song:0,clue:0,answered:false,scored:false,teams:[t0,t1],scores:[0,0]};
  render();
}
function awardPoint(idx){
  if(idx>=0) S.scores[idx]++;
  S.scored=true;
  render();
}
function handleAdvance(){
  if(S.screen==='title'){ goSetup(); return; }
  if(S.screen==='setup'){ beginGame(); return; }
  if(S.screen==='fin'){   goHome(); return; }
  const total=SONGS[S.song].clues.length;
  if(S.clue<total){
    S.clue++; render();
    requestAnimationFrame(()=>{const c=document.getElementById(`cc${S.clue-1}`);if(c){c.style.animation='none';requestAnimationFrame(()=>c.style.animation='');}});
  } else if(!S.answered){
    S.answered=true; render(); confetti(60);
  } else if(!S.scored){
    awardPoint(-1); // Space during scoring = skip
  } else {
    if(S.song<SONGS.length-1){
      S={...S,song:S.song+1,clue:0,answered:false,scored:false};
      render();
    } else {
      S.screen='fin'; render(); confetti(140);
    }
  }
}

/* ── CONFETTI ── */
function confetti(n){
  const cols=['#FFD700','#FF1493','#FF6B35','#00CED1','#FF69B4','#fff','#7B2FBE','#39FF14'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const p=document.createElement('div'); p.className='cf';
      const sz=7+Math.random()*11;
      p.style.cssText=`left:${Math.random()*100}vw;top:-15px;width:${sz}px;height:${sz*(0.4+Math.random())}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2.5+Math.random()*2.5}s;animation-delay:${Math.random()*.4}s;`;
      document.body.appendChild(p); setTimeout(()=>p.remove(),5500);
    },i*25);
  }
}
